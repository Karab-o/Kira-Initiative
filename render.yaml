services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  - type: web
    name: kira-api
    runtime: node
    region: frankfurt     # closest to Rwanda
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SESSION_TTL_HOURS
        value: 24
      - key: AI_RATE_LIMIT_PER_HOUR
        value: 30
      - key: UPLOAD_DIR
        value: ./uploads
