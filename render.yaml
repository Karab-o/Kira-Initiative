services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  - type: web
    name: kira-api
    runtime: node
    region: frankfurt     # closest to Rwanda
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SESSION_TTL_HOURS
        value: 24
      - key: AI_RATE_LIMIT_PER_HOUR
        value: 30
      - key: UPLOAD_DIR
        value: ./uploads

  # ── Frontend (Vite / React static site) ──────────────────────────────────────
  - type: web
    name: kira-client
    runtime: static
    region: frankfurt
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
